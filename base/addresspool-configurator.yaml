apiVersion: v1
kind: ServiceAccount
metadata:
  name: address-pool-configurator
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: address-pool-configurator
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups:
      - metallb.io
    resources:
      - ipaddresspools
    resourceNames:
      - lb-pool
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: address-pool-configurator
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
subjects:
  - kind: ServiceAccount
    name: address-pool-configurator
    namespace: metallb-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: address-pool-configurator
---
apiVersion: batch/v1
kind: Job
metadata:
  name: address-pool-configurator
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: address-pool-configurator
      restartPolicy: OnFailure
      containers:
        - name: configure
          image: registry.access.redhat.com/ubi9/ubi-minimal:9.6
          imagePullPolicy: IfNotPresent
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command:
            - /bin/sh
            - -ec
          args:
            - |
              case "$HOST_IP" in
                *.*.*.*) ;;
                *) echo "Unsupported non-IPv4 node address: $HOST_IP" >&2; exit 1 ;;
              esac

              PREFIX="${HOST_IP%.*}"
              ADDRESSES="${PREFIX}.200-${PREFIX}.250"
              API="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}"
              TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
              CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

              curl --fail --silent --show-error \
                --cacert "$CACERT" \
                --header "Authorization: Bearer $TOKEN" \
                --header "Content-Type: application/merge-patch+json" \
                --request PATCH \
                --data "{\"spec\":{\"addresses\":[\"$ADDRESSES\"]}}" \
                "$API/apis/metallb.io/v1beta1/namespaces/$POD_NAMESPACE/ipaddresspools/lb-pool"

              echo
              echo "Configured MetalLB address pool: $ADDRESSES"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
